name: EAS Staging

on:
  push:
    branches: [staging]
    paths:
      - 'front-mobile/**'
      - '.github/workflows/eas-staging.yml'
  workflow_dispatch:

concurrency:
  group: eas-staging
  cancel-in-progress: false

jobs:
  update:
    name: EAS Update + Discord notify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN secret is missing."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front-mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        working-directory: front-mobile
        run: npm ci

      - name: Publish EAS update
        id: update
        working-directory: front-mobile
        env:
          EXPO_PUBLIC_DEEZER_BASE_URL: ${{ secrets.EXPO_PUBLIC_DEEZER_BASE_URL }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          set -euo pipefail
          eas update --auto --non-interactive --json > update.json
          cat update.json
          GROUP=$(jq -r '.[0].group' update.json)
          BRANCH=$(jq -r '.[0].branch' update.json)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "group=$GROUP" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "update_url=https://expo.dev/accounts/aldo26/projects/front-mobile/updates/$GROUP" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"

      - name: Docker Hub connection
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: |
            📱 **EAS staging update published**

            `${{ steps.update.outputs.commit_msg }}`

            🌿 Branch EAS : `${{ steps.update.outputs.branch }}` — commit `${{ github.sha }}`
            🔗 ${{ steps.update.outputs.update_url }}
