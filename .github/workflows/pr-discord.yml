name: PR Discord Notification

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: |
            📬 @here **New Pull Request** in `${{ github.repository }}`

            **#${{ github.event.pull_request.number }}** — ${{ github.event.pull_request.title }}
            by `${{ github.event.pull_request.user.login }}`
            **${{ github.event.pull_request.head.ref }}** → `${{ github.event.pull_request.base.ref }}`

            ${{ github.event.pull_request.html_url }}
            https://app-rythmix.atlassian.net/browse/${{ github.event.pull_request.head.ref }}
